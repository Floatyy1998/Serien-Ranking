name: Lint, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - uses: actions/setup-node@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_TMDB: ${{ secrets.VITE_API_TMDB }}
          VITE_API_OMDb: ${{ secrets.VITE_API_OMDb }}
          VITE_BACKEND_API_URL: ${{ secrets.VITE_BACKEND_API_URL }}

      - name: Deploy to Firebase
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          npm install -g firebase-tools
          firebase deploy --only hosting --project serien-ranking
