name: Lint, Build & Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          # Volle History, damit `vitest --changed <base>` den Basis-Commit kennt.
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      # Nur die vom Diff betroffenen Tests laufen (nicht die komplette Suite).
      # Push: Basis = Commit vor dem Push. PR: Basis = Ziel-Branch.
      # Fallback (neuer Branch / keine Basis) = volle Suite.
      - name: Unit tests (affected)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          # Shards in getrennten Prozessen: jsdom-Tests bauen ueber viele
          # Dateien kumulativ Speicher auf — bei ~300 Dateien stirbt ein
          # einzelner Fork-Pool am Heap-OOM (alle Tests gruen, Exit 1).
          # Frischer Prozess pro Shard setzt den Speicher zurueck. Historie:
          # 8 Shards/6 GB -> OOM (Jul 2026, package.json-Change = volle Suite),
          # 16 Shards/6 GB -> OOM (18.07.2026, Suite gewachsen). Jetzt 24
          # Shards + 8 GB Heap (Runner hat 16 GB).
          run_shards() {
            for i in $(seq 1 24); do
              npx vitest run "$@" --passWithNoTests --shard="$i/24"
            done
          }
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            BASE="origin/${{ github.base_ref }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && [ -n "${{ github.event.before }}" ]; then
            BASE="${{ github.event.before }}"
          fi
          if [ -n "$BASE" ] && git rev-parse --verify "$BASE" >/dev/null 2>&1; then
            echo "Running tests affected since $BASE"
            run_shards --changed "$BASE"
          else
            echo "No usable base ref — running full suite"
            run_shards
          fi

      - name: Build
        run: npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_API_TMDB: ${{ secrets.VITE_API_TMDB }}
          VITE_API_OMDb: ${{ secrets.VITE_API_OMDb }}
          VITE_BACKEND_API_URL: ${{ secrets.VITE_BACKEND_API_URL }}

      - name: Deploy to Firebase
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          npm install -g firebase-tools
          set +e
          deploy_output=$(firebase deploy --only hosting --project serien-ranking 2>&1)
          deploy_exit=$?
          echo "$deploy_output"
          if [ $deploy_exit -ne 0 ]; then
            if echo "$deploy_output" | grep -q "is the current active version"; then
              echo "::notice::Build output identical to live version — nothing to release."
              exit 0
            fi
            exit $deploy_exit
          fi
