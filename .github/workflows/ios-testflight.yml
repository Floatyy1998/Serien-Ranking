name: iOS TestFlight

# Manuell ausloesen (Actions-Tab -> iOS TestFlight -> Run workflow).
# Die Huelle laedt die Live-Site — ein neuer iOS-Build ist nur noetig,
# wenn sich Natives aendert (Capacitor-Config, Plugins, Icons).
on:
  workflow_dispatch:

jobs:
  build-upload:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Capacitor sync (ios)
        run: npx cap sync ios

      - name: App Store Connect API key ablegen
        env:
          APPSTORE_P8: ${{ secrets.APPSTORE_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPSTORE_P8" > ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8

      # Unsigniert archivieren: Signing erst beim Export (App-Store-Profil
      # braucht keine registrierten Geraete, Development-Profile schon).
      - name: Archive (unsigniert)
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM='${{ secrets.APPLE_TEAM_ID }}' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            MARKETING_VERSION=1.0 \
            CURRENT_PROJECT_VERSION=${{ github.run_number }}

      - name: Export-Optionen schreiben
        run: |
          cat > build/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

      - name: IPA exportieren
        run: |
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${{ secrets.APPSTORE_KEY_ID }}.p8 \
            -authenticationKeyID '${{ secrets.APPSTORE_KEY_ID }}' \
            -authenticationKeyIssuerID '${{ secrets.APPSTORE_ISSUER_ID }}'

      - name: Upload zu TestFlight
        run: |
          xcrun altool --upload-app --type ios \
            --file build/ipa/*.ipa \
            --apiKey '${{ secrets.APPSTORE_KEY_ID }}' \
            --apiIssuer '${{ secrets.APPSTORE_ISSUER_ID }}'

      - name: IPA als Artifact sichern
        uses: actions/upload-artifact@v4
        with:
          name: tv-rank-ios
          path: build/ipa/*.ipa
          retention-days: 14
