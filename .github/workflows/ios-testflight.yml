name: iOS TestFlight

# Manuell ausloesen (Actions-Tab -> iOS TestFlight -> Run workflow).
# Die Huelle laedt die Live-Site — ein neuer iOS-Build ist nur noetig,
# wenn sich Natives aendert (Capacitor-Config, Plugins, Icons).
on:
  workflow_dispatch:

jobs:
  build-upload:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --loglevel=error

      - name: Capacitor sync (ios)
        run: npx cap sync ios

      - name: App Store Connect API key ablegen
        env:
          APPSTORE_P8: ${{ secrets.APPSTORE_P8 }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPSTORE_P8" > ~/private_keys/AuthKey.p8

      - name: Build + Upload via fastlane
        env:
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_P8_PATH: /Users/runner/private_keys/AuthKey.p8
          BUILD_NUMBER: ${{ github.run_number }}
          # xcodebuild -showBuildSettings braucht auf kalten Runnern (SPM-
          # Aufloesung) laenger als das 3s-Default — sonst flakt build_app.
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: '180'
          FASTLANE_XCODEBUILD_SETTINGS_RETRIES: '6'
        run: fastlane ios beta

      - name: IPA + Zertifikate als Artifact sichern
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tv-rank-ios
          path: |
            build/ipa/*.ipa
            build/certs/*
          retention-days: 5
